name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-ocaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x
          opam-repositories: |
            default: https://github.com/ocaml/opam-repository.git

      - name: Cache OCaml dependencies
        id: cache-ocaml
        uses: actions/cache@v4
        with:
          path: |
            ~/.opam
            ~/.cache/opam
            _opam
          key: ocaml-deps-${{ runner.os }}-5.2.x-rocq-v2
          restore-keys: |
            ocaml-deps-${{ runner.os }}-5.2.x-rocq-v2

      - name: Install Rocq dependencies
        if: steps.cache-ocaml.outputs.cache-hit != 'true'
        run: |
          opam install -y rocq-prover coq-lsp

  test:
    needs: setup-ocaml
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Load cached uv dependencies
        id: cached-uv-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock') }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.x
          opam-repositories: |
            default: https://github.com/ocaml/opam-repository.git

      - name: Restore OCaml dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.opam
            ~/.cache/opam
            _opam
          key: ocaml-deps-${{ runner.os }}-5.2.x-rocq-v2
          restore-keys: |
            ocaml-deps-${{ runner.os }}-5.2.x-rocq-v2

      - name: Run tests
        run: |
          eval $(opam env)
          uv run pytest -v

  # Interpreter-drift guard: no opam toolchain, so the pet/coqc-gated
  # files skip (tests/conftest.py availability flags) and this stays fast.
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests (toolchain-free subset)
        run: uv run pytest -q

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check formatting (black)
        run: uv run black --check src/ tests/

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/
